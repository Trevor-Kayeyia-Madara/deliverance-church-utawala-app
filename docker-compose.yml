services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: church_app
      MARIADB_USER: church
      MARIADB_PASSWORD: church_password
      MARIADB_ROOT_PASSWORD: church_root_password
    ports:
      - "3306:3306"
    volumes:
      - church_db_data:/var/lib/mysql/data

volumes:
  church_db_data:
